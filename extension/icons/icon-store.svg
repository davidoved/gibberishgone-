<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Rich dark background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0a0f1d"/>
    </linearGradient>
    <!-- Teal glow gradient -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#0ea5e9" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <!-- Border shimmer gradient -->
    <linearGradient id="border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#0ea5e9" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>

  <!-- Subtle glow circle -->
  <circle cx="64" cy="64" r="48" fill="url(#glow)"/>

  <!-- Top highlight line -->
  <path d="M28 2 L100 2" stroke="rgba(255,255,255,0.08)" stroke-width="1" stroke-linecap="round" fill="none"/>

  <!-- Border with gradient -->
  <rect x="1" y="1" width="126" height="126" rx="27" fill="none" stroke="url(#border)" stroke-width="2"/>

  <!-- Keyboard grid representing layout -->
  <g transform="translate(24, 36)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="18" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.9"/>
    <rect x="22" y="0" width="18" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.5"/>
    <rect x="44" y="0" width="18" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.9"/>
    <rect x="66" y="0" width="18" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.5"/>
    <!-- Row 2 -->
    <rect x="0" y="24" width="18" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.5"/>
    <rect x="22" y="24" width="18" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="1"/>
    <rect x="44" y="24" width="18" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.5"/>
    <rect x="66" y="24" width="18" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.9"/>
    <!-- Row 3 -->
    <rect x="11" y="48" width="62" height="18" rx="4" fill="none" stroke="#2dd4bf" stroke-width="2" opacity="0.7"/>
  </g>

  <!-- Center conversion arrows -->
  <g transform="translate(64, 64)">
    <circle cx="0" cy="0" r="14" fill="rgba(45,212,191,0.15)" stroke="#2dd4bf" stroke-width="2"/>
    <path d="M-5 -2 L0 3 L5 -2" stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M-5 4 L0 9 L5 4" stroke="#2dd4bf" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.5"/>
  </g>

  <!-- Bottom glow dot -->
  <circle cx="64" cy="108" r="3" fill="#2dd4bf" opacity="0.4"/>
</svg>
